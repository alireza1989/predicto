name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: |
          pip install pandas numpy scikit-learn pyarrow pytest pyyaml python-dotenv requests
      - name: Leakage and unit tests
        run: pytest tests/ -q
